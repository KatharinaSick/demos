name: Build & Publish Backstage Image (Your Backstage, Your Problems, Your Metrics)

on:
  push:
    branches:
      - main
    paths:
      - 'your-backstage-your-problems-your-metrics/backstage/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/your-backstage-your-problems-your-metrics/backstage

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Determine version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: your-backstage-your-problems-your-metrics-v
          default_bump: patch
          initial_version: 0.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: your-backstage-your-problems-your-metrics/backstage/.yarn/cache
          key: yarn-${{ hashFiles('your-backstage-your-problems-your-metrics/backstage/yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        working-directory: your-backstage-your-problems-your-metrics/backstage
        run: yarn install --immutable

      - name: TypeScript compile
        working-directory: your-backstage-your-problems-your-metrics/backstage
        run: yarn tsc

      - name: Build backend
        working-directory: your-backstage-your-problems-your-metrics/backstage
        run: yarn build:backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: your-backstage-your-problems-your-metrics/backstage
          file: your-backstage-your-problems-your-metrics/backstage/packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
