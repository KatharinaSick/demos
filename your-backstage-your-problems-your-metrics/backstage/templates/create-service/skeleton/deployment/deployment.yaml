apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.serviceName }}
  namespace: default
  labels:
    app: ${{ values.serviceName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.serviceName }}
  template:
    metadata:
      labels:
        app: ${{ values.serviceName }}
    spec:
      containers:
        - name: ${{ values.serviceName }}
          image: registry:5000/${{ values.serviceName }}:0.1.0
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
