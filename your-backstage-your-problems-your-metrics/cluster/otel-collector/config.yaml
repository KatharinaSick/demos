apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: otel
data:
  collector-config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      debug:
        verbosity: detailed
      otlp/jaeger:
        endpoint: jaeger-collector.jaeger.svc.cluster.local:4317
        tls:
          insecure: true
      otlphttp/dynatrace:
        endpoint: "${env:DT_ENDPOINT}/api/v2/otlp"
        headers:
          Authorization: "Api-Token ${env:DT_API_TOKEN}"

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug, otlp/jaeger, otlphttp/dynatrace]
        metrics:
          receivers: [otlp]
          exporters: [debug, otlphttp/dynatrace]
